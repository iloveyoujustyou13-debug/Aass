    <script>
        (function() {
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const fileList = document.getElementById('fileList');
            const targetSizeInput = document.getElementById('targetSize');
            const compressBtn = document.getElementById('compressBtn');
            const progressSection = document.getElementById('progressSection');
            const progressFill = document.getElementById('progressFill');
            const progressStatus = document.getElementById('progressStatus');
            const progressPercent = document.getElementById('progressPercent');
            const resultBox = document.getElementById('resultBox');
            const origSize = document.getElementById('origSize');
            const compSize = document.getElementById('compSize');
            const reduction = document.getElementById('reduction');
            const downloadBtn = document.getElementById('downloadBtn');

            let selectedFiles = [];
            let compressedResults = [];

            function updateFileList() {
                if (selectedFiles.length === 0) {
                    fileList.textContent = '📎 কোন ফাইল সিলেক্ট করা হয়নি';
                    return;
                }
                const names = selectedFiles.map(f => f.name).join(', ');
                fileList.textContent = `📎 ${names} (${selectedFiles.length} টি ফাইল)`;
            }

            function handleFiles(files) {
                const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf');
                if (pdfFiles.length === 0) {
                    alert('শুধু PDF ফাইল সাপোর্টেড।');
                    return;
                }
                if (pdfFiles.length > 3) {
                    alert('আপনি একসাথে সর্বোচ্চ ৩টি PDF কমপ্রেস করতে পারেন। প্রথম ৩টি নেওয়া হবে।');
                    selectedFiles = pdfFiles.slice(0, 3);
                } else {
                    selectedFiles = pdfFiles;
                }
                updateFileList();
                resultBox.style.display = 'none';
                compressedResults = [];
                progressSection.style.display = 'none';
            }

            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFiles(e.target.files);
                }
                e.target.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleFiles(e.dataTransfer.files);
                }
            });

            function getLevelFromTarget(originalBytes, targetKB) {
                if (targetKB <= 0) return 10;
                const targetBytes = targetKB * 1024;
                const ratio = targetBytes / originalBytes;
                if (ratio >= 0.9) return 1;
                if (ratio >= 0.65) return 2;
                if (ratio >= 0.45) return 4;
                if (ratio >= 0.25) return 6;
                if (ratio >= 0.12) return 8;
                return 10;
            }

            async function compressSinglePDF(file, targetKB, progressCallback) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;
                const originalBytes = file.size;
                const level = getLevelFromTarget(originalBytes, targetKB);
                const scale = Math.max(0.35, 0.55 + (10 - level) * 0.12);
                const quality = Math.max(10, Math.min(92, 92 - (level - 1) * 8.2));
                const newPdf = await PDFLib.PDFDocument.create();

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: scale });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    const blob = await new Promise((resolve) => {
                        canvas.toBlob(resolve, 'image/jpeg', quality / 100);
                    });
                    const imageBytes = await blob.arrayBuffer();
                    const jpgImage = await newPdf.embedJpg(imageBytes);
                    const pdfPage = newPdf.addPage([viewport.width, viewport.height]);
                    pdfPage.drawImage(jpgImage, {
                        x: 0,
                        y: 0,
                        width: viewport.width,
                        height: viewport.height,
                    });
                    if (progressCallback) {
                        progressCallback(i, totalPages);
                    }
                    canvas.width = 0;
                    canvas.height = 0;
                }
                const pdfBytes = await newPdf.save();
                return pdfBytes;
            }

            async function compressAllFiles(files, targetKB) {
                const results = [];
                const totalFiles = files.length;
                for (let idx = 0; idx < files.length; idx++) {
                    const file = files[idx];
                    progressStatus.textContent = `📄 ফাইল ${idx+1}/${totalFiles}: "${file.name}" প্রক্রিয়া করা হচ্ছে...`;
                    const pageProgress = (current, total) => {
                        const fileProgress = (current / total);
                        const overall = (idx + fileProgress) / totalFiles;
                        const percent = Math.min(100, Math.round(overall * 100));
                        progressFill.style.width = percent + '%';
                        progressPercent.textContent = percent + '%';
                    };
                    const bytes = await compressSinglePDF(file, targetKB, pageProgress);
                    results.push({
                        originalName: file.name,
                        bytes: bytes,
                        originalSize: file.size,
                    });
                    const percent = Math.min(100, Math.round(((idx + 1) / totalFiles) * 100));
                    progressFill.style.width = percent + '%';
                    progressPercent.textContent = percent + '%';
                }
                return results;
            }

            compressBtn.addEventListener('click', async () => {
                if (selectedFiles.length === 0) {
                    alert('কমপক্ষে একটি PDF ফাইল সিলেক্ট করুন।');
                    return;
                }
                const targetKB = parseFloat(targetSizeInput.value);
                if (isNaN(targetKB) || targetKB < 1) {
                    alert('দয়া করে একটি বৈধ টার্গেট সাইজ (KB) দিন।');
                    return;
                }
                compressBtn.disabled = true;
                compressBtn.textContent = '⏳ কমপ্রেস চলছে...';
                resultBox.style.display = 'none';
                progressSection.style.display = 'block';
                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                progressStatus.textContent = 'শুরু হচ্ছে...';

                try {
                    const results = await compressAllFiles(selectedFiles, targetKB);
                    compressedResults = results;
                    const first = results[0];
                    const origMB = first.originalSize / (1024 * 1024);
                    const compMB = first.bytes.length / (1024 * 1024);
                    const reductionPercent = ((1 - (first.bytes.length / first.originalSize)) * 100);
                    origSize.textContent = `${origMB.toFixed(2)} MB`;
                    compSize.textContent = `${compMB.toFixed(2)} MB`;
                    reduction.textContent = `${reductionPercent.toFixed(2)}%`;
                    resultBox.style.display = 'block';
                    progressStatus.textContent = `✅ সম্পন্ন! (${results.length} টি ফাইল কমপ্রেস করা হয়েছে)`;
                    progressFill.style.width = '100%';
                    progressPercent.textContent = '100%';
                } catch (err) {
                    console.error(err);
                    alert(`❌ ত্রুটি: ${err.message || 'অজানা ত্রুটি'}`);
                    progressStatus.textContent = '❌ কমপ্রেস ব্যর্থ হয়েছে';
                } finally {
                    compressBtn.disabled = false;
                    compressBtn.textContent = '⬇️ Reduce PDF Size';
                }
            });

            downloadBtn.addEventListener('click', () => {
                if (compressedResults.length === 0) {
                    alert('কোনো কমপ্রেসড ফাইল নেই। আগে কমপ্রেস করুন।');
                    return;
                }
                const first = compressedResults[0];
                const blob = new Blob([first.bytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const baseName = first.originalName.replace(/\.pdf$/i, '');
                a.download = `compressed_${baseName}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            updateFileList();
        })();
    </script>
